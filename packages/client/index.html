<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1"
        />
        <title>Denali WX</title>
        <link rel="manifest" href="/manifest.json" />
        <meta name="theme-color" content="#f5f5f5" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #f5f5f5;
                color: #1a1a1a;
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 15px;
                line-height: 1.4;
                padding: 14px;
                min-height: 100dvh;
            }

            header {
                display: flex;
                align-items: baseline;
                gap: 10px;
                margin-bottom: 12px;
            }
            h1 {
                font-size: 0.72rem;
                font-weight: 600;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: #999;
            }
            .subtitle {
                font-size: 0.68rem;
                color: #bbb;
                letter-spacing: 0.03em;
            }

            textarea {
                width: 100%;
                background: #fff;
                color: #1a1a1a;
                border: 1px solid #d0d0d0;
                border-radius: 6px;
                padding: 10px 12px;
                font-family: monospace;
                font-size: 12px;
                line-height: 1.5;
                resize: vertical;
                min-height: 60px;
                outline: none;
                margin-bottom: 12px;
                -webkit-appearance: none;
            }
            textarea::placeholder {
                color: #bbb;
            }
            textarea:focus {
                border-color: #999;
            }

            .type-badge {
                font-size: 0.68rem;
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
                color: #888;
                margin-bottom: 8px;
            }

            .table-wrap {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border-radius: 8px;
                border: 1px solid #e0e0e0;
                background: #fff;
                margin-bottom: 20px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            th,
            td {
                padding: 7px 8px;
                text-align: center;
                vertical-align: middle;
            }

            th.lbl,
            td.lbl {
                text-align: left;
                position: sticky;
                left: 0;
                background: #fafafa;
                font-size: 0.62rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #aaa;
                white-space: nowrap;
                width: 52px;
                min-width: 52px;
                border-right: 1px solid #ebebeb;
                z-index: 1;
                line-height: 1.3;
            }

            thead tr {
                border-bottom: 2px solid #e8e8e8;
            }
            th.day-h {
                font-size: 0.78rem;
                font-weight: 700;
                color: #555;
                letter-spacing: 0.04em;
                min-width: 68px;
            }

            tbody tr:not(.section-head):not(.model-head) {
                border-bottom: 1px solid #f0f0f0;
            }
            tbody tr:nth-child(even) td:not(.lbl) {
                background: #fafafa;
            }
            tbody tr:nth-child(even) td.lbl {
                background: #f4f4f4;
            }

            tr.section-head td {
                background: #f0f0f0 !important;
                font-size: 0.6rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: #999;
                padding: 4px 8px;
                border-top: 1px solid #e0e0e0;
                border-bottom: 1px solid #e0e0e0;
            }
            tr.section-head td.lbl {
                background: #e8e8e8 !important;
            }

            tr.model-sep td {
                height: 10px;
                background: #f5f5f5 !important;
                border-bottom: 1px solid #e0e0e0;
            }

            tr.model-head td {
                font-size: 0.65rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                padding: 5px 8px;
                border-top: 2px solid #e0e0e0;
                color: #fff;
            }

            .wx-icon {
                font-size: 1.5rem;
                line-height: 1;
                display: block;
            }
            .wx-short {
                font-size: 0.67rem;
                color: #666;
                margin-top: 3px;
                line-height: 1.2;
            }

            .bft-mph {
                font-family: monospace;
                font-size: 0.82rem;
                font-weight: 600;
            }

            .precip-pct {
                font-family: monospace;
                font-size: 0.85rem;
                font-weight: 600;
            }
            .precip-bar {
                height: 3px;
                border-radius: 2px;
                margin-top: 3px;
                background: #e8e8e8;
                overflow: hidden;
            }
            .precip-fill {
                height: 100%;
                border-radius: 2px;
            }

            .snow-val {
                font-family: monospace;
                font-size: 0.85rem;
                font-weight: 600;
                color: #5590cc;
            }
            .snow-unit {
                font-size: 0.68rem;
                color: #aaa;
            }

            .fz-val {
                font-family: monospace;
                font-size: 0.85rem;
                font-weight: 600;
            }

            .wind-cell {
                font-family: monospace;
                font-size: 0.82rem;
                white-space: nowrap;
            }

            .nil {
                color: #ccc;
                font-size: 0.75rem;
            }

            .empty {
                color: #bbb;
                font-size: 0.85rem;
                text-align: center;
                padding: 32px 0;
                font-family: monospace;
            }

            .step {
                border-top: 1px solid #e0e0e0;
                padding-top: 16px;
                margin-bottom: 20px;
            }
            .step-head {
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: #aaa;
                margin-bottom: 12px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .step-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                background: #ddd;
                color: #888;
                font-size: 0.68rem;
                font-weight: 700;
                flex-shrink: 0;
            }
            .step p {
                font-size: 0.82rem;
                color: #555;
            }
            .step strong {
                color: #333;
            }

            .builder {
                display: flex;
                flex-direction: column;
                gap: 12px;
                margin-top: 4px;
            }

            .builder-row {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .builder-label {
                font-size: 0.72rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: #aaa;
                min-width: 72px;
            }

            .builder-opts {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                align-items: center;
            }

            .opt-btn {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 3px 9px;
                border: 1px solid #d0d0d0;
                border-radius: 4px;
                font-size: 0.78rem;
                cursor: pointer;
                background: #fff;
                user-select: none;
                white-space: nowrap;
            }
            .opt-btn:has(input:checked) {
                border-color: #2a6bb5;
                background: #eaf1fb;
                color: #1a4a88;
            }
            .opt-btn input {
                display: none;
            }

            .days-wrap {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #days-slider {
                width: 130px;
                accent-color: #2a6bb5;
            }
            #days-display {
                font-size: 0.82rem;
                font-weight: 600;
                color: #333;
                min-width: 48px;
            }

            .builder-length {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-top: 4px;
            }
            .len-bar-wrap {
                flex: 1;
                max-width: 200px;
                height: 6px;
                background: #e8e8e8;
                border-radius: 3px;
                overflow: hidden;
            }
            .len-bar {
                height: 100%;
                border-radius: 3px;
                transition:
                    width 0.15s,
                    background 0.15s;
            }
            .len-text {
                font-size: 0.78rem;
                font-weight: 600;
                white-space: nowrap;
            }
            .len-ok {
                color: #2a8f5a;
            }
            .len-over {
                color: #cc2222;
            }

            .builder-output {
                display: flex;
                align-items: center;
                gap: 8px;
                background: #fff;
                border: 1px solid #d0d0d0;
                border-radius: 6px;
                padding: 8px 12px;
                margin-top: 4px;
            }
            .builder-output code {
                flex: 1;
                font-family: monospace;
                font-size: 0.85rem;
                color: #333;
                word-break: break-all;
            }
            .copy-btn,
            .fetch-btn {
                padding: 4px 10px;
                font-size: 0.75rem;
                font-weight: 600;
                border-radius: 4px;
                cursor: pointer;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .copy-btn {
                border: 1px solid #2a6bb5;
                background: #2a6bb5;
                color: #fff;
            }
            .copy-btn:hover:not(:disabled) {
                background: #1a5aa5;
                border-color: #1a5aa5;
            }
            .fetch-btn {
                border: 1px solid #d0d0d0;
                background: #f5f5f5;
                color: #333;
            }
            .fetch-btn:hover:not(:disabled) {
                background: #e8e8e8;
            }
            .copy-btn:disabled,
            .fetch-btn:disabled {
                opacity: 0.4;
                cursor: default;
            }
            .fetch-status {
                font-size: 0.78rem;
                color: #888;
            }
            .fetch-error {
                color: #c03030;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>Denali WX</h1>
            <span class="subtitle">inReach decoder · 63.07°N 151.01°W</span>
        </header>

        <section class="step">
            <div class="step-head">
                <span class="step-num">1</span> Build your forecast request
            </div>
            <div class="builder">
                <div class="builder-row">
                    <span class="builder-label">Location</span>
                    <div class="builder-opts">
                        <label class="opt-btn"
                            ><input
                                type="radio"
                                name="location"
                                value="upper"
                                checked
                            />
                            Upper mountain</label
                        >
                        <label class="opt-btn"
                            ><input
                                type="radio"
                                name="location"
                                value="airstrip"
                            />
                            Airstrip</label
                        >
                    </div>
                </div>

                <div class="builder-row">
                    <span class="builder-label">Days</span>
                    <div class="days-wrap">
                        <input
                            type="range"
                            id="days-slider"
                            min="1"
                            max="10"
                            value="10"
                        />
                        <span id="days-display">10 days</span>
                    </div>
                </div>

                <div class="builder-row">
                    <span class="builder-label">Resolution</span>
                    <div class="builder-opts">
                        <label class="opt-btn"
                            ><input
                                type="radio"
                                name="resolution"
                                value="24"
                                checked
                            />
                            Daily</label
                        >
                        <label class="opt-btn"
                            ><input type="radio" name="resolution" value="12" />
                            12h</label
                        >
                        <label class="opt-btn"
                            ><input type="radio" name="resolution" value="6" />
                            6h</label
                        >
                        <label class="opt-btn"
                            ><input type="radio" name="resolution" value="3" />
                            3h</label
                        >
                        <label class="opt-btn"
                            ><input type="radio" name="resolution" value="1" />
                            1h</label
                        >
                    </div>
                </div>

                <div class="builder-row">
                    <span class="builder-label">Models</span>
                    <div class="builder-opts">
                        <label class="opt-btn"
                            ><input
                                type="checkbox"
                                name="model"
                                value="ecmwf"
                                checked
                            />
                            ECMWF</label
                        >
                        <label class="opt-btn"
                            ><input type="checkbox" name="model" value="gfs" />
                            GFS</label
                        >
                        <label class="opt-btn"
                            ><input type="checkbox" name="model" value="icon" />
                            ICON</label
                        >
                    </div>
                </div>

                <div class="builder-row">
                    <span class="builder-label">Forecast Length</span>
                    <div class="builder-length">
                        <div class="len-bar-wrap">
                            <div class="len-bar" id="len-bar"></div>
                        </div>
                        <span class="len-text" id="len-text"></span>
                    </div>
                </div>

                <div class="builder-output">
                    <code id="builder-msg"></code>
                    <button class="fetch-btn" id="fetch-btn">Send</button>
                    <button class="copy-btn" id="builder-copy">Copy</button>
                </div>
                <span class="fetch-status" id="fetch-status"></span>
            </div>
        </section>

        <section class="step">
            <div class="step-head">
                <span class="step-num">2</span> Send the message
            </div>
            <p>
                Send the message to
                <strong>wx@email.laneaasen.com</strong> from your inReach
                device and paste the reply into step 3.
            </p>
        </section>

        <section class="step">
            <div class="step-head">
                <span class="step-num">3</span> Decode the forecast response
            </div>
            <textarea
                id="input"
                placeholder="Paste the encoded forecast from your inReach…"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
            ></textarea>
            <div id="output"></div>
        </section>

        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
